<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabbir's French Island</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-md">
        <h1 class="text-3xl font-bold text-blue-600 mb-6 text-center">🇫🇷 Language Island</h1>
        
        <!-- Form -->
        <div class="mb-8 space-y-4">
            <input id="bn" type="text" placeholder="বাংলা বাক্য" class="w-full p-3 border rounded-lg">
            <input id="fr" type="text" placeholder="French Translation" class="w-full p-3 border rounded-lg">
            <button onclick="addSentence()" class="w-full bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700">Add to Island</button>
        </div>

        <h2 class="text-xl font-semibold mb-4">My Sentences</h2>
        <div id="list" class="space-y-3"></div>
    </div>

    <script>
        async function loadIsland() {
            const res = await fetch('/api/island');
            const data = await res.json();
            document.getElementById('list').innerHTML = data.reverse().map(item => `
                <div class="p-4 bg-gray-50 border-l-4 border-blue-500 rounded">
                    <p class="font-bold text-gray-800">${item.fr}</p>
                    <p class="text-gray-600 text-sm">${item.bn}</p>
                </div>
            `).join('');
        }

        async function addSentence() {
            const bn = document.getElementById('bn').value;
            const fr = document.getElementById('fr').value;
            await fetch('/api/add', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ bn, fr })
            });
            location.reload();
        }
        loadIsland();
    </script>
</body>
</html>
