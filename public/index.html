<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monirul's French Island</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen p-4">
    <div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden mt-6">
        <div class="bg-indigo-600 p-6">
            <h1 class="text-2xl font-bold text-white text-center">Monirul's Language Island 🇫🇷</h1>
        </div>

        <div class="p-6">
            <!-- ইনপুট সেকশন -->
            <div class="space-y-4 mb-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input id="bn" type="text" placeholder="বাংলা বাক্য" class="p-3 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                    <input id="fr" type="text" placeholder="French Translation" class="p-3 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div class="flex gap-4">
                    <input id="category" type="text" list="cat-list" placeholder="ক্যাটাগরি টাইপ করুন" class="flex-grow p-3 border rounded-xl outline-none">
                    <datalist id="cat-list">
                        <option value="Apparel">
                        <option value="Tech">
                        <option value="General">
                    </datalist>
                    <button onclick="addSentence()" id="btn" class="bg-indigo-600 text-white px-6 rounded-xl font-bold hover:bg-indigo-700 transition">Add</button>
                </div>
            </div>

            <hr class="mb-6">

            <!-- সার্চ বার -->
            <div class="mb-6">
                <input id="search" onkeyup="filterList()" type="text" placeholder="সার্চ করুন..." class="w-full p-3 bg-gray-50 border rounded-xl outline-none">
            </div>

            <!-- লিস্ট -->
            <div id="list" class="space-y-4">
                <p class="text-center text-gray-400">Loading your island...</p>
            </div>
        </div>
    </div>

    <script>
        let allData = [];

        async function loadIsland() {
            try {
                const res = await fetch('/api/island');
                allData = await res.json();
                renderList(allData);
            } catch (e) {
                document.getElementById('list').innerHTML = "<p class='text-red-500 text-center'>ডেটা লোড করতে সমস্যা হচ্ছে।</p>";
            }
        }

        function renderList(items) {
            const listDiv = document.getElementById('list');
            if (items.length === 0) {
                listDiv.innerHTML = "<p class='text-center text-gray-400'>কোনো বাক্য পাওয়া যায়নি।</p>";
                return;
            }
            listDiv.innerHTML = [...items].reverse().map(item => `
                <div class="p-4 border rounded-2xl relative bg-white hover:shadow-md transition">
                    <span class="absolute top-2 right-2 text-[10px] bg-indigo-100 text-indigo-700 px-2 py-1 rounded-full font-bold uppercase">
                        ${item.category || 'General'}
                    </span>
                    <p class="font-bold text-indigo-900 text-lg">${item.fr}</p>
                    <p class="text-gray-600 text-sm">${item.bn}</p>
                </div>
            `).join('');
        }

        function filterList() {
            const term = document.getElementById('search').value.toLowerCase();
            const filtered = allData.filter(i => i.bn.toLowerCase().includes(term) || i.fr.toLowerCase().includes(term) || i.category?.toLowerCase().includes(term));
            renderList(filtered);
        }

        async function addSentence() {
            const btn = document.getElementById('btn');
            const bn = document.getElementById('bn').value;
            const fr = document.getElementById('fr').value;
            const category = document.getElementById('category').value;

            if (!bn || !fr) return alert("বাংলা এবং ফরাসি উভয় ঘর পূরণ করুন!");

            btn.disabled = true;
            btn.innerText = "Saving...";

            try {
                const response = await fetch('/api/add', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ bn, fr, category })
                });
                
                if (response.ok) {
                    location.reload();
                } else {
                    alert("গিটহাবে সেভ হতে সমস্যা হয়েছে। আপনার Vercel-এর GITHUB_TOKEN চেক করুন।");
                    btn.disabled = false;
                    btn.innerText = "Add";
                }
            } catch (error) {
                alert("এরর: " + error.message);
                btn.disabled = false;
                btn.innerText = "Add";
            }
        }
        loadIsland();
    </script>
</body>
</html>
