<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monirul's Language Island 🇫🇷</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <!-- Nav -->
    <nav class="bg-indigo-700 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">🇫🇷 Language Island</h1>
            <div id="login-container">
                <div id="g_id_onload" data-client_id="339348039848-9sc9fgbg3ap3879d8a385m961q7noi18.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
                <div class="g_id_signin" data-type="standard"></div>
            </div>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto p-4 mt-8">
        
        <!-- Admin Tool (Gemini AI) -->
        <div id="adminPanel" class="hidden bg-white p-6 rounded-3xl shadow-sm mb-8 border-2 border-indigo-100">
            <h2 class="font-bold text-indigo-700 mb-4 text-xs uppercase tracking-widest">Admin Control: AI Generator</h2>
            <div class="flex gap-3">
                <input id="aiTopic" type="text" placeholder="Topic: e.g. Factory, React Code, Coffee Shop" class="flex-grow p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-400">
                <button onclick="generateAI()" id="aiBtn" class="bg-indigo-600 text-white px-8 rounded-2xl font-bold hover:bg-indigo-800 transition shadow-lg">Generate</button>
            </div>
        </div>

        <!-- Search & Tools -->
        <div class="flex flex-col md:flex-row gap-4 mb-8">
            <input id="search" onkeyup="filterList()" type="text" placeholder="খুঁজুন (বাংলা বা ফরাসি)..." class="flex-grow p-4 bg-white shadow-sm rounded-2xl outline-none">
            <button onclick="toggleRecall()" id="recallBtn" class="bg-orange-500 text-white px-8 py-4 rounded-2xl font-bold shadow-md hover:bg-orange-600 transition">Active Recall</button>
        </div>

        <!-- Island List -->
        <div id="list" class="space-y-4"></div>
    </main>

    <!-- AI Approval Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-[100]">
        <div class="bg-white p-8 rounded-3xl max-w-md w-full shadow-2xl">
            <h3 class="text-xl font-bold text-indigo-700 mb-4">Confirm AI Generation</h3>
            <div class="bg-indigo-50 p-4 rounded-2xl mb-6 text-center">
                <p id="modal-fr" class="text-2xl font-bold text-indigo-900 mb-2"></p>
                <p id="modal-bn" class="text-gray-600 italic"></p>
            </div>
            <div class="flex gap-4">
                <button onclick="saveAIContent()" class="flex-grow bg-indigo-600 text-white p-4 rounded-2xl font-bold">Save</button>
                <button onclick="closeModal()" class="flex-grow bg-gray-100 text-gray-600 p-4 rounded-2xl font-bold">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let allData = [];
        let recallMode = false;
        let currentUser = null;
        let pendingSentence = null;

        async function handleCredentialResponse(response) {
            try {
                const base64Url = response.credential.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const payload = JSON.parse(window.atob(base64));
                currentUser = payload.email;

                // ব্যাকএন্ডকে জিজ্ঞেস করা এটি এডমিন কি না
                const adminCheck = await fetch('/api/check-admin', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email: currentUser })
                });
                const { isAdmin } = await adminCheck.json();
                
                if (isAdmin) {
                    document.getElementById('adminPanel').classList.remove('hidden');
                }
                
                document.getElementById('login-container').innerHTML = `
                    <img src="${payload.picture}" class="w-10 h-10 rounded-full border-2 border-white shadow-sm">
                `;
            } catch (e) { console.error("Login failed", e); }
        }

        async function loadIsland() {
            const res = await fetch('/api/island');
            allData = await res.json();
            renderList(allData);
        }

        function renderList(items) {
            const listDiv = document.getElementById('list');
            listDiv.innerHTML = [...items].reverse().map(item => `
                <div class="p-6 bg-white rounded-3xl shadow-sm border border-gray-50 flex justify-between items-center group">
                    <div class="flex-grow cursor-pointer" onclick="this.querySelector('.fr-text').classList.toggle('hidden')">
                        <span class="text-[10px] font-bold text-indigo-300 uppercase tracking-tighter">${item.category || 'General'}</span>
                        <p class="text-lg text-gray-700 font-medium mt-1">${item.bn}</p>
                        <p class="fr-text text-2xl font-bold text-indigo-700 mt-2 ${recallMode ? 'hidden' : ''}">${item.fr}</p>
                    </div>
                    <button onclick="speak('${item.fr}')" class="ml-4 bg-indigo-50 p-4 rounded-2xl hover:bg-indigo-600 hover:text-white transition">🔊</button>
                </div>
            `).join('');
        }

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'fr-FR';
            msg.rate = 0.8;
            window.speechSynthesis.speak(msg);
        }

        function toggleRecall() {
            recallMode = !recallMode;
            renderList(allData);
        }

        async function generateAI() {
            const topic = document.getElementById('aiTopic').value;
            if(!topic) return;
            const btn = document.getElementById('aiBtn');
            btn.innerText = "...";
            try {
                const res = await fetch('/api/ai-generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ topic })
                });
                const data = await res.json();
                pendingSentence = { ...data, category: topic };
                document.getElementById('modal-fr').innerText = data.fr;
                document.getElementById('modal-bn').innerText = data.bn;
                document.getElementById('modal').classList.remove('hidden');
            } catch (e) { alert("AI Error"); }
            btn.innerText = "Generate";
        }

        async function saveAIContent() {
            await fetch('/api/add', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ ...pendingSentence, userEmail: currentUser })
            });
            location.reload();
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        function filterList() {
            const term = document.getElementById('search').value.toLowerCase();
            const filtered = allData.filter(i => i.bn.toLowerCase().includes(term) || i.fr.toLowerCase().includes(term));
            renderList(filtered);
        }

        loadIsland();
    </script>
</body>
</html>
