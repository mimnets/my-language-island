<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monirul's Language Island</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <!-- Header & Login -->
    <nav class="bg-indigo-600 text-white p-4 shadow-lg flex justify-between items-center">
        <h1 class="text-xl font-bold">🇫🇷 Language Island</h1>
        <div id="g_id_onload" data-client_id="YOUR_GOOGLE_CLIENT_ID" data-callback="handleCredentialResponse"></div>
        <div class="g_id_signin" data-type="standard"></div>
    </nav>

    <main class="max-w-3xl mx-auto p-4 mt-6">
        
        <!-- AI Generator Section (Only for Admin - Hidden by default) -->
        <div id="adminPanel" class="hidden bg-white p-6 rounded-2xl shadow-sm mb-6 border-2 border-indigo-200">
            <h2 class="font-bold text-indigo-700 mb-4 text-sm uppercase">Admin Tool: AI Generator</h2>
            <div class="flex gap-2">
                <input id="aiTopic" type="text" placeholder="উদা: Office, Kitchen, Fabric" class="flex-grow p-3 border rounded-xl outline-none">
                <button onclick="generateAI()" id="aiBtn" class="bg-indigo-600 text-white px-6 rounded-xl font-bold">Generate</button>
            </div>
        </div>

        <!-- Search & Stats -->
        <div class="flex gap-4 mb-6">
            <input id="search" onkeyup="filterList()" type="text" placeholder="খুঁজুন (বাংলা বা ফরাসি)..." class="flex-grow p-4 bg-white shadow-sm rounded-2xl outline-none">
            <button onclick="toggleRecall()" class="bg-orange-500 text-white px-6 rounded-2xl font-bold shadow-md">Active Recall</button>
        </div>

        <!-- Sentence List -->
        <div id="list" class="space-y-4"></div>
    </main>

    <script>
        let allData = [];
        let recallMode = false;
        let currentUser = null;

        // গুগল লগইন হ্যান্ডলার
        function handleCredentialResponse(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            currentUser = payload.email;
            if (currentUser === "YOUR_ADMIN_EMAIL") {
                document.getElementById('adminPanel').classList.remove('hidden');
            }
        }

        async function loadIsland() {
            const res = await fetch('/api/island');
            allData = await res.json();
            renderList(allData);
        }

        function renderList(items) {
            const listDiv = document.getElementById('list');
            listDiv.innerHTML = [...items].reverse().map((item, index) => `
                <div class="p-5 bg-white rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center group">
                    <div class="flex-grow cursor-pointer" onclick="this.querySelector('.fr-text').classList.toggle('hidden')">
                        <p class="text-sm text-gray-400 mb-1">${item.category || 'General'}</p>
                        <p class="text-lg text-gray-800 font-medium">${item.bn}</p>
                        <p class="fr-text text-xl font-bold text-indigo-600 mt-1 ${recallMode ? 'hidden' : ''}">${item.fr}</p>
                    </div>
                    <button onclick="speak('${item.fr}')" class="bg-indigo-50 p-3 rounded-full hover:bg-indigo-100 transition">
                        🔊
                    </button>
                </div>
            `).join('');
        }

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'fr-FR';
            msg.rate = 0.8; // একটু স্লো যাতে শ্যাডোয়িং করতে সুবিধা হয়
            window.speechSynthesis.speak(msg);
        }

        function toggleRecall() {
            recallMode = !recallMode;
            renderList(allData);
            alert(recallMode ? "Active Recall Mode: ক্লিক করলে ফরাসি দেখা যাবে।" : "Normal Mode");
        }

        async function generateAI() {
            const topic = document.getElementById('aiTopic').value;
            const btn = document.getElementById('aiBtn');
            btn.innerText = "...";
            const res = await fetch('/api/ai-generate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ topic })
            });
            const data = await res.json();
            if(confirm(`Add this? \nBN: ${data.bn} \nFR: ${data.fr}`)) {
                await fetch('/api/add', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ ...data, category: topic, userEmail: currentUser })
                });
                location.reload();
            }
            btn.innerText = "Generate";
        }

        function filterList() {
            const term = document.getElementById('search').value.toLowerCase();
            const filtered = allData.filter(i => i.bn.toLowerCase().includes(term) || i.fr.toLowerCase().includes(term));
            renderList(filtered);
        }

        loadIsland();
    </script>
</body>
</html>
