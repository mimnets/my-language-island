<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monirul's French Island 🇫🇷</title>
    <!-- Tailwind CSS (CDN for quick development) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Identity Services Library -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <!-- Navigation Bar -->
    <nav class="bg-indigo-700 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <span>🇫🇷</span> Language Island
            </h1>
            <!-- Google Sign-In Button -->
            <div id="login-container">
                <div id="g_id_onload"
                     data-client_id="339348039848-9sc9fgbg3ap3879d8a385m961q7noi18.apps.googleusercontent.com"
                     data-callback="handleCredentialResponse">
                </div>
                <div class="g_id_signin" data-type="standard"></div>
            </div>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto p-4 mt-6">
        
        <!-- Admin Panel: AI Generator (Hidden by default) -->
        <div id="adminPanel" class="hidden bg-white p-6 rounded-3xl shadow-sm mb-8 border-2 border-indigo-100 transition-all">
            <h2 class="font-bold text-indigo-700 mb-4 text-xs uppercase tracking-widest">Admin Control: Generate with AI</h2>
            <div class="flex gap-3">
                <input id="aiTopic" type="text" placeholder="Topic: e.g. Airport, Interview, Dinner" 
                       class="flex-grow p-4 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-indigo-400">
                <button onclick="generateAI()" id="aiBtn" 
                        class="bg-indigo-600 text-white px-8 rounded-2xl font-bold hover:bg-indigo-800 transition shadow-lg">
                    Generate
                </button>
            </div>
            <p class="text-[10px] text-gray-400 mt-2 ml-1">*এটি জেমিনাই এআই ব্যবহার করে বাক্য তৈরি করবে।</p>
        </div>

        <!-- Search & Mode Toggles -->
        <div class="flex flex-col md:flex-row gap-4 mb-8">
            <div class="relative flex-grow">
                <span class="absolute left-4 top-4 text-gray-400">🔍</span>
                <input id="search" onkeyup="filterList()" type="text" placeholder="খুঁজুন (বাংলা বা ফরাসি)..." 
                       class="w-full p-4 pl-12 bg-white shadow-sm rounded-2xl outline-none focus:ring-2 focus:ring-indigo-300">
            </div>
            <button onclick="toggleRecall()" id="recallBtn" 
                    class="bg-orange-500 text-white px-8 py-4 rounded-2xl font-bold shadow-md hover:bg-orange-600 transition">
                Active Recall
            </button>
        </div>

        <!-- Language Island List -->
        <div id="list" class="space-y-4">
            <div class="text-center py-20">
                <div class="animate-spin inline-block w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full mb-4"></div>
                <p class="text-gray-400">Loading your island...</p>
            </div>
        </div>
    </main>

    <!-- UI Overlay for AI Approval -->
    <div id="modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-[100]">
        <div class="bg-white p-8 rounded-3xl max-w-md w-full shadow-2xl">
            <h3 class="text-xl font-bold text-indigo-700 mb-4">Confirm AI Generation</h3>
            <div class="bg-indigo-50 p-4 rounded-2xl mb-6">
                <p id="modal-fr" class="text-xl font-bold text-indigo-900 mb-2"></p>
                <p id="modal-bn" class="text-gray-600"></p>
            </div>
            <div class="flex gap-4">
                <button onclick="saveAIContent()" class="flex-grow bg-indigo-600 text-white p-4 rounded-2xl font-bold">Save to Island</button>
                <button onclick="closeModal()" class="flex-grow bg-gray-100 text-gray-600 p-4 rounded-2xl font-bold">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let allData = [];
        let recallMode = false;
        let currentUser = null;
        let pendingSentence = null;

        // গুগল লগইন হ্যান্ডলার
        function handleCredentialResponse(response) {
            try {
                const base64Url = response.credential.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const payload = JSON.parse(window.atob(base64));
                
                currentUser = payload.email;
                console.log("Logged in as:", currentUser);

                // এডমিন প্যানেল চেক (আপনার ইমেইলটি ছোট হাতের অক্ষরে চেক হবে)
                // আপনার এডমিন ইমেইলটি নিচে বসিয়ে দিন
                const adminEmail = "mimnets@gmail.com"; 
                
                if (currentUser.toLowerCase() === adminEmail.toLowerCase()) {
                    document.getElementById('adminPanel').classList.remove('hidden');
                    alert("স্বাগতম মনিরুল ভাই! এডমিন টুলস এখন অ্যাক্টিভ।");
                }
                
                document.getElementById('login-container').innerHTML = `
                    <img src="${payload.picture}" class="w-10 h-10 rounded-full border-2 border-white shadow-sm" title="${payload.name}">
                `;
            } catch (e) {
                console.error("Login Error:", e);
            }
        }

        // ডাটা লোড করা
        async function loadIsland() {
            try {
                const res = await fetch('/api/island');
                allData = await res.json();
                renderList(allData);
            } catch (e) {
                console.error("Fetch failed", e);
            }
        }

        // লিস্ট রেন্ডার করা
        function renderList(items) {
            const listDiv = document.getElementById('list');
            if (!items || items.length === 0) {
                listDiv.innerHTML = "<p class='text-center text-gray-400 py-10'>কোনো বাক্য পাওয়া যায়নি।</p>";
                return;
            }
            
            listDiv.innerHTML = [...items].reverse().map((item) => `
                <div class="p-6 bg-white rounded-3xl shadow-sm border border-gray-100 flex justify-between items-center group hover:border-indigo-200 transition-all">
                    <div class="flex-grow cursor-pointer" onclick="this.querySelector('.fr-text').classList.toggle('hidden')">
                        <span class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest">${item.category || 'General'}</span>
                        <p class="text-lg text-gray-700 font-medium mt-1">${item.bn}</p>
                        <p class="fr-text text-2xl font-bold text-indigo-700 mt-2 transition-all ${recallMode ? 'hidden' : ''}">
                            ${item.fr}
                        </p>
                    </div>
                    <button onclick="speak('${item.fr}')" class="ml-4 bg-indigo-50 p-4 rounded-2xl hover:bg-indigo-600 hover:text-white transition-colors group">
                        <span class="text-xl">🔊</span>
                    </button>
                </div>
            `).join('');
        }

        // অডিও উচ্চারণ (Web Speech API)
        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'fr-FR';
            msg.rate = 0.85; // শ্যাডোয়িং এর জন্য সামান্য স্লো করা হয়েছে
            window.speechSynthesis.speak(msg);
        }

        // Active Recall মোড টগল
        function toggleRecall() {
            recallMode = !recallMode;
            const btn = document.getElementById('recallBtn');
            btn.classList.toggle('bg-orange-500');
            btn.classList.toggle('bg-slate-800');
            renderList(allData);
        }

        // AI দিয়ে বাক্য জেনারেট করা
        async function generateAI() {
            const topic = document.getElementById('aiTopic').value;
            if (!topic) return alert("দয়া করে একটি টপিক লিখুন।");
            
            const btn = document.getElementById('aiBtn');
            btn.innerText = "Generating...";
            btn.disabled = true;

            try {
                const res = await fetch('/api/ai-generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ topic })
                });
                const data = await res.json();
                
                pendingSentence = { ...data, category: topic };
                
                document.getElementById('modal-fr').innerText = data.fr;
                document.getElementById('modal-bn').innerText = data.bn;
                document.getElementById('modal').classList.remove('hidden');
            } catch (e) {
                alert("AI জেনারেশন ফেইল করেছে। আবার চেষ্টা করুন।");
            } finally {
                btn.innerText = "Generate";
                btn.disabled = false;
            }
        }

        // ডাটাবেজে (GitHub) সেভ করা
        async function saveAIContent() {
            if (!pendingSentence) return;
            
            try {
                const res = await fetch('/api/add', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ ...pendingSentence, userEmail: currentUser })
                });
                
                if (res.ok) {
                    location.reload();
                } else {
                    alert("সেভ করতে সমস্যা হয়েছে।");
                }
            } catch (e) {
                alert("এরর: " + e.message);
            }
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            pendingSentence = null;
        }

        // সার্চ ফিল্টার
        function filterList() {
            const term = document.getElementById('search').value.toLowerCase();
            const filtered = allData.filter(i => 
                i.bn.toLowerCase().includes(term) || 
                i.fr.toLowerCase().includes(term) || 
                (i.category && i.category.toLowerCase().includes(term))
            );
            renderList(filtered);
        }

        // শুরুতে ডাটা লোড
        loadIsland();
    </script>
</body>
</html>
