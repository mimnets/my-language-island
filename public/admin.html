<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Language Island</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="bg-gray-100 min-h-screen p-8">

    <div class="max-w-5xl mx-auto">
        <div class="bg-white p-8 rounded-3xl shadow-lg mb-8">
            <div class="flex justify-between items-center border-b pb-6 mb-6">
                <div>
                    <h1 class="text-2xl font-bold text-indigo-700">🔐 Admin Panel</h1>
                    <p class="text-sm text-gray-500">Language Island Management</p>
                </div>
                <div id="adminInfo" class="hidden flex items-center gap-4">
                    <span id="adminName" class="font-bold text-indigo-600"></span>
                    <button onclick="logout()" class="bg-red-100 text-red-600 px-4 py-2 rounded-xl font-semibold hover:bg-red-200 transition">Sign Out</button>
                </div>
            </div>
            
            <div id="loginSection">
                <div class="flex justify-center">
                    <div id="g_id_onload" data-client_id="339348039848-9sc9fgbg3ap3879d8a385m961q7noi18.apps.googleusercontent.com" data-callback="handleAdminLogin"></div>
                    <div class="g_id_signin" data-type="standard"></div>
                </div>
            </div>

            <div id="adminTools" class="hidden space-y-8">
                
                <!-- AI Generator with Phonetics -->
                <div class="bg-gradient-to-r from-amber-50 to-orange-50 p-6 rounded-2xl border border-amber-200">
                    <h3 class="font-bold text-amber-800 mb-4">✨ AI Generator (with Phonetics)</h3>
                    <div class="grid md:grid-cols-2 gap-4">
                        <input id="aiTopic" type="text" placeholder="Topic (e.g. Fashion, Shopping)" class="p-3 rounded-xl border border-amber-200 outline-none">
                        <input id="aiCategory" type="text" placeholder="Category name" class="p-3 rounded-xl border border-amber-200 outline-none">
                    </div>
                    <button onclick="generateAI()" id="genBtn" class="mt-4 w-full bg-amber-500 text-white px-6 py-3 rounded-xl font-semibold hover:bg-amber-600 transition">Generate with Phonetics</button>
                </div>

                <!-- Stats -->
                <div class="grid md:grid-cols-3 gap-6">
                    <div class="bg-indigo-50 p-6 rounded-2xl border border-indigo-200">
                        <h3 class="font-bold text-indigo-800 mb-3">📊 Island Statistics</h3>
                        <div class="space-y-2">
                            <div class="flex justify-between">
                                <span class="text-gray-600">Total Sentences</span>
                                <span id="totalApproved" class="font-bold text-indigo-700">0</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-600">Pending Review</span>
                                <span id="totalPending" class="font-bold text-amber-700">0</span>
                            </div>
                        </div>
                    </div>
                    <div class="bg-green-50 p-6 rounded-2xl border border-green-200 md:col-span-2">
                        <h3 class="font-bold text-green-800 mb-3">🔊 Text-to-Speech Test</h3>
                        <div class="flex gap-3">
                            <input id="testFr" type="text" placeholder="French text to speak" class="flex-grow p-3 rounded-xl border border-green-200 outline-none">
                            <button onclick="testSpeak()" class="bg-green-600 text-white px-6 py-3 rounded-xl font-semibold hover:bg-green-700 transition">🔊 Speak</button>
                        </div>
                    </div>
                </div>

                <!-- Pending Submissions -->
                <div>
                    <h3 class="font-bold text-gray-800 mb-4">📋 Pending Submissions</h3>
                    <div id="pendingList" class="space-y-4">
                        <p class="text-center text-gray-400 py-8">Loading...</p>
                    </div>
                </div>

                <!-- Manage Island (Delete Sentences) -->
                <div>
                    <h3 class="font-bold text-gray-800 mb-4">🗑️ Manage Island Sentences</h3>
                    <div id="islandList" class="space-y-3">
                        <p class="text-center text-gray-400 py-8">Loading...</p>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="text-center text-sm text-gray-400">
            <a href="/" class="hover:text-indigo-600">← Back to Island</a>
        </div>
    </div>

    <script>
        var adminEmail = "";

        function handleAdminLogin(response) {
            var payload = JSON.parse(atob(response.credential.split('.')[1]));
            adminEmail = payload.email;
            document.getElementById('adminName').innerText = payload.name;
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('adminInfo').classList.remove('hidden');
            document.getElementById('adminTools').classList.remove('hidden');
            loadStats();
            loadPending();
            loadIsland();
        }

        async function loadStats() {
            try {
                var res = await fetch('/api/island');
                if (res.ok) {
                    var data = await res.json();
                    document.getElementById('totalApproved').textContent = data.length;
                }
            } catch(e) {}
            
            try {
                var res2 = await fetch('/api/admin/pending', {
                    headers: {'x-admin-email': adminEmail}
                });
                if (res2.ok) {
                    var pending = await res2.json();
                    document.getElementById('totalPending').textContent = pending.length;
                }
            } catch(e) {}
        }

        async function loadPending() {
            var list = document.getElementById('pendingList');
            try {
                var res = await fetch('/api/admin/pending', {
                    headers: {'x-admin-email': adminEmail}
                });
                var data = await res.json();
                
                if (data.length === 0) {
                    list.innerHTML = '<p class="text-center text-gray-400 py-8">No pending submissions</p>';
                    return;
                }
                
                var html = '';
                for (var i = 0; i < data.length; i++) {
                    var item = data[i];
                    html += '<div class="bg-gray-50 p-5 rounded-2xl border">' +
                        '<div class="flex justify-between items-start gap-4">' +
                        '<div class="flex-grow space-y-2">' +
                        '<span class="inline-block text-[10px] bg-amber-100 text-amber-700 px-2 py-1 rounded-md font-bold uppercase">' + (item.category || 'General') + '</span>' +
                        '<p class="text-xs text-gray-500">From: ' + (item.submitterEmail || 'anonymous') + '</p>' +
                        '<div class="grid grid-cols-2 gap-4 text-sm">' +
                        '<div><span class="text-gray-400 text-xs">বাংলা:</span><p class="text-gray-800">' + (item.bn || '') + '</p></div>' +
                        '<div><span class="text-gray-400 text-xs">বাংলা উচ্চারণ:</span><p class="text-gray-600 italic">' + (item.bn_phonetic || '-') + '</p></div>' +
                        '<div><span class="text-gray-400 text-xs">Français:</span><p class="text-lg font-bold text-indigo-700">' + (item.fr || '') + '</p></div>' +
                        '<div><span class="text-gray-400 text-xs">Phonétique:</span><p class="text-gray-600 italic">' + (item.fr_phonetic || '-') + '</p></div>' +
                        '</div>' +
                        '<p class="text-xs text-gray-400 mt-2">' + (item.submittedAt || '') + '</p></div>' +
                        '<div class="flex flex-col gap-2">' +
                        '<button onclick="approve(\'' + item.id + '\')" class="bg-green-500 text-white px-4 py-2 rounded-xl font-semibold hover:bg-green-600 transition text-sm">✓ Approve</button>' +
                        '<button onclick="reject(\'' + item.id + '\')" class="bg-red-100 text-red-600 px-4 py-2 rounded-xl font-semibold hover:bg-red-200 transition text-sm">✗ Reject</button></div></div>';
                }
                list.innerHTML = html;
            } catch(e) {
                list.innerHTML = '<p class="text-center text-red-400 py-8">Failed to load pending submissions</p>';
            }
        }

        async function loadIsland() {
            var list = document.getElementById('islandList');
            try {
                var res = await fetch('/api/island');
                var data = await res.json();
                
                if (data.length === 0) {
                    list.innerHTML = '<p class="text-center text-gray-400 py-8">No sentences in island</p>';
                    return;
                }
                
                var html = '';
                for (var i = 0; i < data.length; i++) {
                    var item = data[i];
                    html += '<div class="bg-white p-4 rounded-xl border flex justify-between items-center gap-4 hover:bg-gray-50 transition">' +
                        '<div class="flex-grow min-w-0">' +
                        '<span class="inline-block text-[10px] bg-indigo-100 text-indigo-700 px-2 py-1 rounded-md font-bold uppercase mb-1">' + (item.category || 'General') + '</span>' +
                        '<p class="text-sm text-gray-600 truncate">' + (item.bn || '') + '</p>' +
                        '<p class="text-lg font-bold text-indigo-700 truncate">' + (item.fr || '') + '</p>' +
                        '</div>' +
                        '<button onclick="deleteSentence(\'' + (item.id || item.bn) + '\')" class="bg-red-100 text-red-600 px-4 py-2 rounded-xl font-semibold hover:bg-red-200 transition text-sm flex-shrink-0">🗑️ Delete</button></div>';
                }
                list.innerHTML = html;
            } catch(e) {
                list.innerHTML = '<p class="text-center text-red-400 py-8">Failed to load island</p>';
            }
        }

        async function approve(id) {
            try {
                var res = await fetch('/api/admin/approve', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email: adminEmail, id: id})
                });
                var data = await res.json();
                if (data.success) {
                    alert('Sentence approved and added to island!');
                    loadStats();
                    loadPending();
                    loadIsland();
                } else {
                    alert('Error: ' + (data.error || 'Failed'));
                }
            } catch(e) { alert('Failed to approve'); }
        }

        async function reject(id) {
            if (!confirm('Reject this submission?')) return;
            try {
                var res = await fetch('/api/admin/reject', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email: adminEmail, id: id})
                });
                var data = await res.json();
                if (data.success) {
                    loadStats();
                    loadPending();
                } else {
                    alert('Error: ' + (data.error || 'Failed'));
                }
            } catch(e) { alert('Failed to reject'); }
        }

        async function deleteSentence(id) {
            if (!confirm('Delete this sentence from island? This cannot be undone.')) return;
            try {
                var res = await fetch('/api/admin/delete', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email: adminEmail, id: id})
                });
                var data = await res.json();
                if (data.success) {
                    alert('Sentence deleted!');
                    loadStats();
                    loadIsland();
                } else {
                    alert('Error: ' + (data.error || 'Failed'));
                }
            } catch(e) { alert('Failed to delete'); }
        }

        async function generateAI() {
            var topic = document.getElementById('aiTopic').value;
            var category = document.getElementById('aiCategory').value || topic;
            if (!topic) return;
            
            var btn = document.getElementById('genBtn');
            btn.disabled = true;
            btn.textContent = 'Generating...';
            
            try {
                var res = await fetch('/api/add-sentence', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        topic: topic,
                        category: category,
                        email: adminEmail,
                        generateAI: true
                    })
                });
                var data = await res.json();
                if (data.success) {
                    alert('Successfully added!\n\n' + 
                        '🇫🇷 ' + data.sentence.fr + '\n' +
                        '🔤 ' + (data.sentence.fr_phonetic || 'N/A') + '\n' +
                        '🇧🇩 ' + data.sentence.bn + '\n' +
                        '📝 ' + (data.sentence.bn_phonetic || 'N/A'));
                    document.getElementById('aiTopic').value = '';
                    document.getElementById('aiCategory').value = '';
                    loadStats();
                    loadIsland();
                } else {
                    alert('Error: ' + (data.error || 'Failed'));
                }
            } catch(e) { alert('Failed to generate'); }
            btn.disabled = false;
            btn.textContent = 'Generate with Phonetics';
        }

        function testSpeak() {
            var text = document.getElementById('testFr').value;
            if (!text) return;
            var msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'fr-FR';
            msg.rate = 0.85;
            window.speechSynthesis.speak(msg);
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
